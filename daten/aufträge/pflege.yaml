aufträge:
  - auftrag_id: "tutorial_ruhe_001"
    name: "Einführung: Ruhe einhalten"
    art: "tutorial"
    öffentlich: false
    npc: "Mira"
    beschreibung: "Mira sagt: „Betreuer verdienen ihr Geld zunächst mit fremden Fablingen. Mein Gluthase ist völlig erschöpft und steht noch unter Strom. Ein müder Fabling trainiert schlecht, hört schlechter zu und verletzt sich leichter. Wenn du Erschöpfung oder Unruhe bemerkst, ist Ruhe die richtige Antwort. Für ihn reicht jetzt eine angeleitete Ruhephase.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "gluthase"
        spitzname: "Miras Gluthase"
        charakter: "aufgeweckt und ruhelos"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          energie: 35
          stress: 38
          stimmung: 45
    voraussetzungen:
      tutorialschritt: "ruhe_starten"
    ziele:
      energie_mindestens: 49
      stress_höchstens: 32
    belohnungen:
      geld: 80
      ruf:
        pflege: 2
        zuverlässigkeit: 2
    fehlschlag:
      hinweis: "Mira sagt: „Er ist mir noch zu erschöpft und zu unruhig. Bring ihn erst zurück, wenn er wacher wirkt und wieder besser ansprechbar ist.“"

  - auftrag_id: "tutorial_pflege_002"
    name: "Einführung: Pflege und Ausrüstung"
    art: "tutorial"
    öffentlich: false
    npc: "Brann"
    beschreibung: "Brann sagt: „Sieh dir das Fell an: nicht dreckig, aber klar ungeordnet. Bei Fell, Schuppen, Moos oder Federn ist Pflege keine Dekoration, sondern Gesundheitskontrolle. Du findest dabei kleine Verletzungen, Parasiten und Stresszeichen früher. Für einen Moosluchs brauchst du eine Moosbürste. Während du aktiv bürstest, bleibst du beim Fabling und betreust nichts anderes.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "moosluchs"
        spitzname: "Branns Moosluchs"
        charakter: "stolz und pflegeempfindlich"
        lieblingsfutter: "kräuterheu"
        starter_kandidat: true
        start_zustand:
          fellpflege: 38
          stimmung: 48
          stress: 32
    voraussetzungen:
      tutorialschritt: "pflege_und_ausrüstung"
    ziele:
      fellpflege_mindestens: 50
    belohnungen:
      geld: 180
      ruf:
        pflege: 3
        zuverlässigkeit: 1
    fehlschlag:
      hinweis: "Brann sagt: „So gebe ich ihn noch nicht frei. Sein Fell wirkt noch zu ungeordnet; da kann man kleine Probleme zu leicht übersehen.“"

  - auftrag_id: "tutorial_aktiv_passiv_003"
    name: "Einführung: Aktive und passive Betreuung"
    art: "tutorial"
    öffentlich: false
    npc: "Mira"
    beschreibung: "Mira sagt: „Nicht jede Betreuung braucht dich gleich stark. Mein Quellfink ist erschöpft und angespannt; kontrollierte Ruhe hilft ihm, ohne deine ständige Anwesenheit wieder Kraft zu sammeln. Mein Gluthase ist dagegen unsicher. Vertrauen entsteht nicht durch Wegstellen, sondern durch aktive, freundliche Beschäftigung. Leg zuerst Quellfink ruhig ab, dann spiel bewusst mit Gluthase.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "quellfink"
        spitzname: "Miras Quellfink"
        charakter: "wachsam, aber erschöpft"
        lieblingsfutter: "apfelstücke"
        starter_kandidat: true
        start_zustand:
          energie: 36
          stress: 34
      - art_id: "gluthase"
        spitzname: "Miras Gluthase"
        charakter: "neugierig, aber unsicher"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          vertrauen: 38
          stimmung: 42
    voraussetzungen:
      tutorialschritt: "aktiv_passiv"
    ziele:
      fabling_ziele:
        - spitzname: "Miras Quellfink"
          energie_mindestens: 50
          stress_höchstens: 28
        - spitzname: "Miras Gluthase"
          vertrauen_mindestens: 45
          stimmung_mindestens: 54
    belohnungen:
      geld: 120
      ruf:
        pflege: 3
        zuverlässigkeit: 3
    fehlschlag:
      hinweis: "Mira sagt: „So passt es noch nicht. Quellfink soll ruhiger und wacher wirken, und Gluthase soll dir deutlich offener begegnen.“"

  - auftrag_id: "tutorial_futter_004"
    name: "Einführung: Futtervorlieben"
    art: "tutorial"
    öffentlich: false
    npc: "Jonna"
    beschreibung: "Jonna sagt: „Futter ist nicht nur Nachfüllen. Ein Fabling, das sein Futter mag, wird offener und lässt sich leichter betreuen. Ein wählerischer Fabling zeigt dir aber nicht sofort eine Zahl, sondern Verhalten: Zögern, Interesse, Abwenden. Kauf Futter, beobachte meinen Moosluchs und setze nur die Vorliebe, die du wirklich mit vorhandenem Futter anbieten kannst.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "moosluchs"
        spitzname: "Jonnas Moosluchs"
        charakter: "vorsichtig und wählerisch"
        lieblingsfutter: "kräuterheu"
        starter_kandidat: true
        start_zustand:
          stimmung: 44
    voraussetzungen:
      tutorialschritt: "futterauftrag"
    ziele:
      futter_priorität: "kräuterheu"
    belohnungen:
      geld: 110
      ruf:
        pflege: 2
        zuverlässigkeit: 2
    fehlschlag:
      hinweis: "Jonna sagt: „Er nimmt das so noch nicht richtig an. Achte darauf, welches Futter er tatsächlich bevorzugt und ob du es auch im Inventar hast.“"

  - auftrag_id: "tutorial_betreuung_005"
    name: "Einführung: Betreuungszeit"
    art: "tutorial"
    öffentlich: false
    npc: "Jonna"
    beschreibung: "Jonna sagt: „Vertrauen wächst durch verlässliche Nähe. Gemeinsames Spiel kann einen scheuen Fabling öffnen, aber Dauerfeuer kippt schnell in Überforderung. Wenn du merkst, dass ein Fabling müde oder angespannt wird, gib ihm eine kurze Pause. Für diesen Auftrag zählt beides: Zeit mit dir und ein Quellfink, der dir danach mehr zutraut.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "quellfink"
        spitzname: "Jonnas Quellfink"
        charakter: "scheu und aufmerksam"
        lieblingsfutter: "apfelstücke"
        starter_kandidat: true
        start_zustand:
          vertrauen: 34
          sicherheit: 40
          stimmung: 42
    voraussetzungen:
      tutorialschritt: "betreuungszeit"
    ziele:
      betreuungsdauer_sekunden: 240
      vertrauen_mindestens: 41
    belohnungen:
      geld: 160
      ruf:
        pflege: 3
        zuverlässigkeit: 4
    fehlschlag:
      hinweis: "Jonna sagt: „Er ist noch nicht lange genug bei dir angekommen. Er soll nicht nur beschäftigt sein, sondern dir wirklich etwas mehr vertrauen.“"

  - auftrag_id: "tutorial_wettbewerb_006"
    name: "Einführung: Wettbewerbsvorbereitung"
    art: "tutorial"
    öffentlich: false
    npc: "Brann"
    beschreibung: "Brann sagt: „Wettbewerbe sind keine Showeinlage am Rand. Lizenzen und seltenere Fablinge hängen daran, ob du gezielt vorbereiten kannst. Ausdruck entsteht aus Präsenz, Stimmung und Training; ein müder oder gestresster Fabling zeigt davon wenig. Schau dir meinen Gluthasen an und übe Ausdruck, bis er für einen Probewettbewerb tragfähig wirkt.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "gluthase"
        spitzname: "Branns Gluthase"
        charakter: "lebhaft und präsent"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          energie: 58
          stress: 28
    voraussetzungen:
      tutorialschritt: "wettbewerb_vorbereitung"
    ziele:
      wettbewerb_mindestens:
        ausdruck: 50
    belohnungen:
      geld: 200
      ruf:
        pflege: 4
        zuverlässigkeit: 5
    fehlschlag:
      hinweis: "Brann sagt: „Für einen Probewettbewerb ist sein Ausdruck noch zu schwach. Er braucht mehr Präsenz, ohne dabei hektisch zu werden.“"


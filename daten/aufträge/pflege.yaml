        charakter: "lebhaft und schnell abgelenkt"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: false
    voraussetzungen:
      mindest_lizenz: null
      mindest_ruf:
        pflege: 0
    ziele:
      abgeschlossene_aktion: "ausdruck_üben"
    belohnungen:
      geld: 260
      ruf:
        pflege: 6
        zuverlässigkeit: 4
    fehlschlag:
      geld_multiplikator: 0.3
      ruf_verlust:

    npc: "Mira"
    beschreibung: "Mira gibt dir zwei Fablinge: Lege zuerst Quellfink zur Kontrollierten Ruhe, damit er ohne deine ständige Anwesenheit Energie sammelt. Danach spielst du aktiv mit Gluthase."
    dauer_tage: 1
    fabelwesen:
      - art_id: "quellfink"
        spitzname: "Quellfink"
        charakter: "wachsam, aber erschöpft"
        lieblingsfutter: "apfelstücke"
        starter_kandidat: true
        start_zustand:
          energie: 36
          stress: 34
      - art_id: "gluthase"
        spitzname: "Gluthase"
        charakter: "neugierig, aber unsicher"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          vertrauen: 38
          stimmung: 42
    voraussetzungen:
      tutorialschritt: "aktiv_passiv"
    ziele:
      abgeschlossene_aktionen: ["kontrollierte_ruhe", "gemeinsames_spiel"]
    belohnungen:
      geld: 120
      ruf:
        pflege: 3
        zuverlässigkeit: 3
    fehlschlag: {}


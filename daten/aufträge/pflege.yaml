        pflege: 12
        zuverlässigkeit: 5
    fehlschlag:
      hinweis: "Mira sagt: „So nehme ich ihn noch nicht zurück. Er wirkt noch zu angespannt oder nicht gepflegt genug.“"
      geld_multiplikator: 0.3
      ruf_verlust:
        zuverlässigkeit: 3


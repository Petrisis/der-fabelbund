aufträge:
  - auftrag_id: "tutorial_ruhe_001"
    name: "Einführung: Ruhe einhalten"
    art: "tutorial"
    öffentlich: false
    npc: "Mira"
    beschreibung: "Mira sagt: „Betreuer verdienen ihr Geld zunächst mit fremden Fablingen. Mein Gluthase ist völlig erschöpft. Nutze angeleitete Ruhe.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "gluthase"
        spitzname: "Gluthase"
        charakter: "aufgeweckt und ruhelos"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          energie: 35
          stress: 38
          stimmung: 45
    voraussetzungen:
      tutorialschritt: "ruhe_starten"
    ziele:
      energie_mindestens: 49
      stress_höchstens: 32
    belohnungen:
      geld: 80
      ruf:
        pflege: 2
        zuverlässigkeit: 2
    fehlschlag: {}

  - auftrag_id: "tutorial_pflege_002"
    name: "Einführung: Pflege und Ausrüstung"
    art: "tutorial"
    öffentlich: false
    npc: "Brann"
    beschreibung: "Brann sagt: „Manche Pflege funktioniert nur mit passendem Werkzeug. Kauf mit Miras Belohnung eine Moosbürste und pflege danach meinen Moosluchs. Während du aktiv bürstest, bleibst du beim Fabling und kannst nicht parallel etwas anderes betreuen.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "moosluchs"
        spitzname: "Moosluchs"
        charakter: "stolz und pflegeempfindlich"
        lieblingsfutter: "kräuterheu"
        starter_kandidat: true
        start_zustand:
          fellpflege: 38
          stimmung: 48
          stress: 32
    voraussetzungen:
      tutorialschritt: "pflege_und_ausrüstung"
    ziele:
      abgeschlossene_aktion: "sanfte_fellpflege"
      fellpflege_mindestens: 50
    belohnungen:
      geld: 180
      ruf:
        pflege: 3
        zuverlässigkeit: 1
    fehlschlag: {}

  - auftrag_id: "tutorial_aktiv_passiv_003"

aufträge:
  - auftrag_id: "tutorial_ruhe_001"
    name: "Einführung: Ruhe einhalten"
    art: "tutorial"
    öffentlich: false
    npc: "Mira"
    beschreibung: "Mira sagt: „Betreuer verdienen ihr Geld zunächst mit fremden Fablingen. Miras Gluthase ist völlig erschöpft. Nutze angeleitete Ruhe.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "gluthase"
        spitzname: "Miras Gluthase"
        charakter: "aufgeweckt und ruhelos"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          energie: 35
          stress: 38
          stimmung: 45
    voraussetzungen:
      tutorialschritt: "ruhe_starten"
    ziele:
      energie_mindestens: 49
      stress_höchstens: 32
    belohnungen:
      geld: 80
      ruf:
        pflege: 2
        zuverlässigkeit: 2
    fehlschlag:
      hinweis: "Mira sagt: „Er ist mir noch zu erschöpft und zu unruhig. Gib ihm noch etwas Zeit, bevor du ihn zurückbringst.“"

  - auftrag_id: "tutorial_pflege_002"
    name: "Einführung: Pflege und Ausrüstung"
    art: "tutorial"
    öffentlich: false
    npc: "Brann"
    beschreibung: "Brann sagt: „Manche Pflege funktioniert nur mit passendem Werkzeug. Kauf mit Miras Belohnung eine Moosbürste und pflege danach Branns Moosluchs. Während du aktiv bürstest, bleibst du beim Fabling und kannst nicht parallel etwas anderes betreuen.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "moosluchs"
        spitzname: "Branns Moosluchs"
        charakter: "stolz und pflegeempfindlich"
        lieblingsfutter: "kräuterheu"
        starter_kandidat: true
        start_zustand:
          fellpflege: 38
          stimmung: 48
          stress: 32
    voraussetzungen:
      tutorialschritt: "pflege_und_ausrüstung"
    ziele:
      fellpflege_mindestens: 50
    belohnungen:
      geld: 180
      ruf:
        pflege: 3
        zuverlässigkeit: 1
    fehlschlag:
      hinweis: "Brann sagt: „So gebe ich ihn noch nicht frei. Sein Fell braucht sichtbar mehr Ordnung.“"

  - auftrag_id: "tutorial_aktiv_passiv_003"
    name: "Einführung: Aktive und passive Betreuung"
    art: "tutorial"
    öffentlich: false
    npc: "Mira"
    beschreibung: "Mira gibt dir zwei Fablinge: Lege zuerst Miras Quellfink zur Kontrollierten Ruhe, damit er ohne deine ständige Anwesenheit Energie sammelt. Danach spielst du aktiv mit Miras Gluthase."
    dauer_tage: 1
    fabelwesen:
      - art_id: "quellfink"
        spitzname: "Miras Quellfink"
        charakter: "wachsam, aber erschöpft"
        lieblingsfutter: "apfelstücke"
        starter_kandidat: true
        start_zustand:
          energie: 36
          stress: 34
      - art_id: "gluthase"
        spitzname: "Miras Gluthase"
        charakter: "neugierig, aber unsicher"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          vertrauen: 38
          stimmung: 42
    voraussetzungen:
      tutorialschritt: "aktiv_passiv"
    ziele:
      fabling_ziele:
        - spitzname: "Miras Quellfink"
          energie_mindestens: 50
          stress_höchstens: 28
        - spitzname: "Miras Gluthase"
          vertrauen_mindestens: 45
          stimmung_mindestens: 54
    belohnungen:
      geld: 120
      ruf:
        pflege: 3
        zuverlässigkeit: 3
    fehlschlag:
      hinweis: "Mira sagt: „So passt es noch nicht. Quellfink soll ruhiger und wacher wirken, und Gluthase soll dir deutlich offener begegnen.“"

  - auftrag_id: "tutorial_futter_004"
    name: "Einführung: Futtervorlieben"
    art: "tutorial"
    öffentlich: false
    npc: "Jonna"
    beschreibung: "Jonna sagt: „Fablinge nehmen Futter unterschiedlich an. Beobachte Jonnas Moosluchs genau und setze die Futterpräferenz, die zu ihm passt, bevor du ihn zurückgibst.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "moosluchs"
        spitzname: "Jonnas Moosluchs"
        charakter: "vorsichtig und wählerisch"
        lieblingsfutter: "kräuterheu"
        starter_kandidat: true
        start_zustand:
          stimmung: 44
    voraussetzungen:
      tutorialschritt: "futterauftrag"
    ziele:
      futter_priorität: "kräuterheu"
    belohnungen:
      geld: 110
      ruf:
        pflege: 2
        zuverlässigkeit: 2
    fehlschlag:
      hinweis: "Jonna sagt: „Er nimmt das so noch nicht richtig an. Schau dir seine Futtervorliebe noch einmal an.“"

  - auftrag_id: "tutorial_betreuung_005"
    name: "Einführung: Betreuungszeit"
    art: "tutorial"
    öffentlich: false
    npc: "Jonna"
    beschreibung: "Manche Aufträge verlangen nicht nur einen Zustand, sondern verlässliche Zeit. Freunde dich mit Jonnas Quellfink an, aber gönne ihm zwischendurch eine kurze Pause."
    dauer_tage: 1
    fabelwesen:
      - art_id: "quellfink"
        spitzname: "Jonnas Quellfink"
        charakter: "scheu und aufmerksam"
        lieblingsfutter: "apfelstücke"
        starter_kandidat: true
        start_zustand:
          vertrauen: 34
          sicherheit: 40
          stimmung: 42
    voraussetzungen:
      tutorialschritt: "betreuungszeit"
    ziele:
      betreuungsdauer_sekunden: 1800
      vertrauen_mindestens: 41
    belohnungen:
      geld: 160
      ruf:
        pflege: 3
        zuverlässigkeit: 4
    fehlschlag:
      hinweis: "Jonna sagt: „Er ist noch nicht lange genug bei dir angekommen. Nimm dir mehr Zeit und achte darauf, dass er Vertrauen fasst.“"

  - auftrag_id: "tutorial_wettbewerb_006"
    name: "Einführung: Wettbewerbsvorbereitung"
    art: "tutorial"
    öffentlich: false
    npc: "Brann"
    beschreibung: "Brann erklärt dir, dass gute Wettbewerbe über Lizenzen und seltenere Fablinge entscheiden. Bereite Branns Gluthase gezielt für Ausdruck vor."
    dauer_tage: 1
    fabelwesen:
      - art_id: "gluthase"
        spitzname: "Branns Gluthase"
        charakter: "lebhaft und präsent"
        lieblingsfutter: "honigbeeren"
        starter_kandidat: true
        start_zustand:
          energie: 58
          stress: 28
    voraussetzungen:
      tutorialschritt: "wettbewerb_vorbereitung"
    ziele:
      wettbewerb_mindestens:
        ausdruck: 50
    belohnungen:
      geld: 200
      ruf:
        pflege: 4
        zuverlässigkeit: 5
    fehlschlag:
      hinweis: "Brann sagt: „Für einen Probewettbewerb ist sein Ausdruck noch zu schwach. Da muss mehr Präsenz rein.“"


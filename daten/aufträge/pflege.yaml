        pflege: 6
        zuverlässigkeit: 3
    fehlschlag:
      geld_multiplikator: 0.3
      ruf_verlust:
        zuverlässigkeit: 2

  - auftrag_id: "training_ausdruck_001"
    name: "Kurze Ausdrucksübung"

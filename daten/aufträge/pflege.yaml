    name: "Einführung: Betreuungszeit"
    art: "tutorial"
    öffentlich: false
    npc: "Jonna"
    beschreibung: "Jonna sagt: „Vertrauen wächst durch verlässliche Nähe. Gemeinsames Spiel ist hier der naheliegende Weg, einen scheuen Fabling zu öffnen, aber Dauerfeuer kippt schnell in Überforderung. Wenn du merkst, dass ein Fabling müde oder angespannt wird, gib ihm eine kurze Pause. Für diesen Auftrag zählt beides: Zeit mit dir und ein Quellfink, der dir danach mehr zutraut.“"
    dauer_tage: 1
    fabelwesen:
      - art_id: "quellfink"
        spitzname: "Jonnas Quellfink"
        charakter: "scheu und aufmerksam"
        lieblingsfutter: "apfelstücke"
        starter_kandidat: true
        start_zustand:
          vertrauen: 34
          sicherheit: 40
          stimmung: 42
    voraussetzungen:
      tutorialschritt: "betreuungszeit"
    ziele:
      betreuungsdauer_sekunden: 240
      vertrauen_mindestens: 41
    belohnungen:
      geld: 25
      ruf:
        pflege: 3
        zuverlässigkeit: 4
    fehlschlag:
      hinweis: "Jonna sagt: „Er ist noch nicht lange genug bei dir angekommen. Er soll nicht nur beschäftigt sein, sondern dir wirklich etwas mehr vertrauen.“"

  - auftrag_id: "tutorial_wettbewerb_006"
    name: "Einführung: Wettbewerbsvorbereitung"

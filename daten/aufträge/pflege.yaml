    öffentlich: true
    aushang_gewicht: 70
    mindestens_offizielles_mitglied: true
    npc: "Brann"
    beschreibung: "Ein Fabling soll vor einem kleinen Sichtungstermin eine ruhige Ausdrucksübung absolvieren."
    dauer_tage: 3
    fabelwesen:
